<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StoneWrld</title>

    <!-- Press Start 2P from Google Fonts — sanctioned body-text fallback per design/06-style §Typography
         (m6x11 is the preferred body font but requires manual itch.io download;
          Press Start 2P is OFL, easy to load, pixel-perfect at integer sizes). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=block"
      rel="stylesheet"
    />

    <style>
      /* Self-host Pixellari from public/fonts/ — OFL, see public/fonts/Pixellari-LICENSE.txt
         Native size is 16px; renders pixel-perfect at integer multiples (16/32/48). */
      @font-face {
        font-family: 'Pixellari';
        src: url('/fonts/Pixellari.ttf') format('truetype');
        font-display: block;
        font-weight: normal;
        font-style: normal;
      }

      /* Page chrome stays out of the Phaser canvas's way.
         Background = Ryusui deep navy (design/06-style §Master palette)
         so the canvas blends seamlessly into the page during scale transitions. */
      html, body {
        margin: 0;
        padding: 0;
        background: #0A1228;
        color: #F0EBD7;
        font-family: 'Press Start 2P', monospace;
        overflow: hidden;
      }
      #game {
        display: block;
        margin: 0 auto;
        /* Defeat any browser-side image smoothing — pixel-art canvases must
           upscale via nearest-neighbour per design/06-style §Pixel-art principles. */
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
