<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StoneWrld</title>

    <style>
      /* Pixellari — OFL, see public/fonts/Pixellari-LICENSE.txt
         Native size 16px; pixel-perfect at integer multiples (16/32/48). */
      @font-face {
        font-family: 'Pixellari';
        src: url('/fonts/Pixellari.ttf') format('truetype');
        font-display: block;
        font-weight: normal;
        font-style: normal;
      }

      /* Press Start 2P — OFL, see public/fonts/PressStart2P-LICENSE.txt
         Self-hosted to eliminate the Google Fonts CDN race per design/06-style.
         Native size 8px; pixel-perfect at integer multiples (8/16/24). */
      @font-face {
        font-family: 'Press Start 2P';
        src: url('/fonts/PressStart2P.ttf') format('truetype');
        font-display: block;
        font-weight: normal;
        font-style: normal;
      }

      /* Page chrome stays out of the Phaser canvas's way.
         Background = Ryusui deep navy (design/06-style §Master palette)
         so the canvas blends seamlessly into the page during scale transitions. */
      html, body {
        margin: 0;
        padding: 0;
        background: #0A1228;
        color: #F0EBD7;
        font-family: 'Press Start 2P', monospace;
        overflow: hidden;
      }
      #game {
        /* Fill the viewport so the Phaser RESIZE canvas has the whole
           browser window to draw on. No letterbox bars — HUD anchors
           to the right edge dynamically via UIScene. */
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        /* Defeat browser-side image smoothing — pixel art upscales via
           nearest-neighbour per design/06-style §Pixel-art principles. */
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #game canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
